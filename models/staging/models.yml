version: 2

models:
  - name: stg_customers # Nome do modelo 
    column: 
      - name: customer_id # Nome da coluna
        description: 'id único da coluna'
        data_test: 
          - not_null # Teste na coluna para garantir que não haja valores nulos
          - unique # Teste para garantir valores unicos
      - name: company_name # Nome da coluna
        data_test:
          - not_null # Teste para garantir que não haja valores nulos
      - name: country # Nome da coluna 

  - name: stg_order_details
    column: 
      - name: order_id
        data_test:
          - not_null
      - name: product_id
        data_test:
          - not_null
      - name: unit_price
        data_test: 
          - not_null
      - name: quantity
        data_test:
          - not_null
      - name: discount
  - name: stg_orders
    columns:
      - name: order_id
        data_test:
          - not_null
          - unique
      - name: customer_id
        data_test: 
          - not_null
      - name: employee_id
        data_test:
          - not_null
      - name: order_date
        data_test:
          - not_null
  - name: stg_ptoducts
    columns:
      - name: product_id
        data_test:
          - not_null
          - unique
      - name: product_name
        data_test:
          - not_null
          
        
        
