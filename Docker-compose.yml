version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_dbt
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbt
    ports:
      - "5433:5432"  # Expondo na porta 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./northwind.sql:/docker-entrypoint-initdb.d/northwind.sql  # Adiciona o script SQL na inicialização

  dbt:
    build: .
    container_name: dbt_runner
    depends_on:
      db:
        condition: service_healthy  # Aguarda o banco estar pronto
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ["sh", "-c", "dbt run && tail -f /dev/null"]  # Executa o dbt automaticamente

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_dbt
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data:

